<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>緊急傷病聯絡表產生器</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #f4f4f9; line-height: 1.6; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #2c3e50; }
        .section { border-bottom: 1px solid #eee; padding-bottom: 15px; margin-bottom: 15px; }
        .section-title { font-weight: bold; color: #e67e22; margin-bottom: 10px; display: block; }
        label { display: block; margin: 5px 0; font-size: 0.9em; color: #666; }
        input, select { width: 100%; padding: 8px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #27ae60; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; margin-top: 10px; }
        button:hover { background-color: #219150; }
        #result { white-space: pre-wrap; background: #f9f9f9; padding: 15px; border: 1px dashed #ccc; margin-top: 20px; font-size: 14px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>🚑 聯絡表自動產生器</h2>
    
    <div class="section">
        <label>報告日期</label>
        <input type="text" id="reportDate" placeholder="例如：4月6日">
    </div>

    <div class="section">
        <span class="section-title">📍 坪頂營區</span>
        <label>救護車車號</label>
        <input type="text" id="car1" value="軍H-20378">
        
        <label>車長</label>
        <select id="leader1" onchange="updatePhone('leader1', 'leader1Phone')"></select>
        <input type="text" id="leader1Phone" placeholder="電話自動帶入">
        
        <label>駕駛</label>
        <select id="driver1" onchange="updatePhone('driver1', 'driver1Phone')"></select>
        <input type="text" id="driver1Phone" placeholder="電話自動帶入">
    </div>

    <div class="section">
        <span class="section-title">📍 嵩山營區</span>
        <label>救護車車號</label>
        <input type="text" id="car2" value="軍H-60142">
        
        <label>車長</label>
        <select id="leader2" onchange="updatePhone('leader2', 'leader2Phone')"></select>
        <input type="text" id="leader2Phone" placeholder="電話自動帶入">
        
        <label>駕駛</label>
        <select id="driver2" onchange="updatePhone('driver2', 'driver2Phone')"></select>
        <input type="text" id="driver2Phone" placeholder="電話自動帶入">
    </div>

    <div class="section">
        <span class="section-title">☎️ 戰情官資訊</span>
        <label>職稱姓名</label>
        <input type="text" id="dutyOfficer" value="通信官中尉王蔚">
        <label>民線</label>
        <input type="text" id="civLine" value="07-8913762">
        <label>軍線</label>
        <input type="text" id="milLine" value="712318">
    </div>

    <button onclick="generateAndCopy()">生成內容並複製</button>
    <div id="result"></div>
</div>

<script>
// --- 通訊錄資料區 (請根據實際需求修改這裡的內容) ---
const contacts = [
    { unit: "防空營", rank: "上士", name: "謝倉玄", phone: "0917-186363" },
    { unit: "防空營", rank: "下士", name: "謝佳霖", phone: "0980-516200" },
    { unit: "防空暨飛彈指揮部", rank: "上尉", name: "田家增", phone: "0909-500707" },
    { unit: "防空暨飛彈指揮部", rank: "下士", name: "周哲宇", phone: "0938-013937" },
    // 你可以在下面繼續增加人名...
];

// 初始化日期
document.getElementById('reportDate').value = (new Date().getMonth() + 1) + "月" + new Date().getDate() + "日";

// 填充下拉選單
const selects = ['leader1', 'driver1', 'leader2', 'driver2'];
selects.forEach(id => {
    const el = document.getElementById(id);
    el.innerHTML = '<option value="">-- 請選擇 --</option>';
    contacts.forEach(person => {
        const optionText = `${person.unit}${person.rank}${person.name}`;
        el.innerHTML += `<option value="${optionText}" data-phone="${person.phone}">${optionText}</option>`;
    });
});

// 自動帶入電話
function updatePhone(selectId, phoneInputId) {
    const select = document.getElementById(selectId);
    const phoneInput = document.getElementById(phoneInputId);
    const selectedOption = select.options[select.selectedIndex];
    phoneInput.value = selectedOption.getAttribute('data-phone') || "";
}

function generateAndCopy() {
    const date = document.getElementById('reportDate').value;
    const content = 
`${date}砲指部緊急傷病聯絡表：

坪頂營區
🚑救護車🚑
車號：${document.getElementById('car1').value}
車長：${document.getElementById('leader1').value}
${document.getElementById('leader1Phone').value}
駕駛：${document.getElementById('driver1').value}
${document.getElementById('driver1Phone').value}

區域醫院：高雄小港醫院🏥
後送路程：約7分鐘
聯絡電話：07-8036783

嵩山營區
🚑救護車🚑
車號：${document.getElementById('car2').value}
車長：${document.getElementById('leader2').value}
${document.getElementById('leader2Phone').value}
駕駛：${document.getElementById('driver2').value}
${document.getElementById('driver2Phone').value}

區域醫院：高雄旗山醫院🏥
後送路程：約10-15分鐘
聯絡電話：07-6613811

☎️戰情官☎️
坪頂營區
${document.getElementById('dutyOfficer').value}
民線：${document.getElementById('civLine').value}
軍線：${document.getElementById('milLine').value}`;

    // 顯示結果
    const resultDiv = document.getElementById('result');
    resultDiv.innerText = content;
    resultDiv.style.display = 'block';

    // 複製到剪貼簿
    navigator.clipboard.writeText(content).then(() => {
        alert('內容已生成並成功複製到剪貼簿！');
    }).catch(err => {
        alert('複製失敗，請手動全選複製。');
    });
}
</script>

</body>
</html>
